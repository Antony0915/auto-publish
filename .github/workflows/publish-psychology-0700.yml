name: 心理疗愈 7:00 发布
on:
  schedule:
    - cron: '0 23 * * *'  # 北京时间 07:00 = UTC 前一天 23:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run publish script
        env:
          YIXIAOER_API_KEY: ${{ secrets.YIXIAOER_API_KEY }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python3 auto-publish/xl_publish.py
      
      - name: Push tracking file
        run: |
          cd "${{ github.workspace }}"
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add auto-publish/xl-images_used.json 2>/dev/null || exit 0
          git commit -m "chore: update images tracking $(date '+%Y-%m-%d %H:%M')" || exit 0
          git push
