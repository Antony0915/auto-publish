name: 心理疗愈 7:00 发布
on:
  schedule:
    - cron: '0 23 * * *'  # 北京时间 07:00 = UTC 前一天 23:00
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run publish script
        env:
          YIXIAOER_API_KEY: ${{ secrets.YIXIAOER_API_KEY }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
        run: python3 auto-publish/xl_publish.py
      
      - name: Notify on failure
        if: failure()
        run: echo "心理疗愈 7:00 发布失败"
