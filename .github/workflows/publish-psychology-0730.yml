name: 心理疗愈 7:30 发布
on:
  schedule:
    - cron: '30 7 * * *'  # 每天 07:30 (UTC+8)
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run publish script
        env:
          YIXIAOER_API_KEY: ${{ secrets.YIXIAOER_API_KEY }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
        run: python3 auto-publish/xl_publish.py
