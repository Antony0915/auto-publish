name: 万金油大叔 23:30 发布
on:
  schedule:
    - cron: '30 15 * * *'  # 北京时间 23:30 = UTC 15:30
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run publish script
        env:
          YIXIAOER_API_KEY: ${{ secrets.YIXIAOER_API_KEY }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
        run: python3 auto-publish/auto_publish.py
